<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-4">Test Registration API</h1>
        
        <form id="testForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" id="name" value="Test User" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" value="test@example.com" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" value="123456" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">User Type</label>
                <select id="userType" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Department</label>
                <select id="department" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                </select>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                Test Registration
            </button>
        </form>
        
        <div id="result" class="mt-4 p-4 bg-gray-100 rounded-md hidden">
            <h3 class="font-semibold">API Response:</h3>
            <pre id="responseText" class="mt-2 text-sm"></pre>
        </div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                action: 'register',
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('password').value,
                userType: document.getElementById('userType').value,
                department: document.getElementById('department').value
            };
            
            try {
                console.log('Sending registration data:', formData);
                
                const response = await fetch('http://localhost/WD%20Master%20Project/backend/api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const result = await response.text();
                console.log('Response text:', result);
                
                let jsonResult;
                try {
                    jsonResult = JSON.parse(result);
                } catch (e) {
                    jsonResult = { error: 'Invalid JSON response', raw: result };
                }
                
                // Show result
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('responseText').textContent = JSON.stringify(jsonResult, null, 2);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('responseText').textContent = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
