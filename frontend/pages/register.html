<!-- 
Database Schema (MySQL)
---------------------------------
students(student_id PK, name, email, password, department_id FK)
teachers(teacher_id PK, name, email, password, department_id FK, role ENUM[student,teacher,HOD,admin])
departments(department_id PK, dept_name)
subjects(subject_id PK, subject_name, teacher_id FK, department_id FK)
feedback(feedback_id PK, student_id FK, teacher_id FK, subject_id FK, rating INT, comment TEXT, timestamp)
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Feedback System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="../index.html" class="text-2xl font-bold text-blue-600">FeedbackHub</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="../index.html" class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Back to Home</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Header -->
            <div class="text-center">
                <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                    Create your account
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    Or
                    <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500">
                        sign in to your existing account
                    </a>
                </p>
            </div>

            <!-- Registration Form -->
            <form class="mt-8 space-y-6" id="registerForm">
                <!-- User Type Selection -->
                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-700">I want to register as a:</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="relative flex cursor-pointer rounded-lg border border-gray-300 bg-white p-4 shadow-sm focus:outline-none">
                            <input type="radio" name="userType" value="student" class="sr-only" required>
                            <span class="flex flex-1">
                                <span class="flex flex-col">
                                    <span class="block text-sm font-medium text-gray-900">Student</span>
                                    <span class="mt-1 flex items-center text-xs text-gray-500">Submit feedback</span>
                                </span>
                            </span>
                            <span class="pointer-events-none absolute -inset-px rounded-lg border-2" aria-hidden="true"></span>
                        </label>
                        <label class="relative flex cursor-pointer rounded-lg border border-gray-300 bg-white p-4 shadow-sm focus:outline-none">
                            <input type="radio" name="userType" value="teacher" class="sr-only" required>
                            <span class="flex flex-1">
                                <span class="flex flex-col">
                                    <span class="block text-sm font-medium text-gray-900">Teacher</span>
                                    <span class="mt-1 flex items-center text-xs text-gray-500">View feedback</span>
                                </span>
                            </span>
                            <span class="pointer-events-none absolute -inset-px rounded-lg border-2" aria-hidden="true"></span>
                        </label>
                        <label class="relative flex cursor-pointer rounded-lg border border-gray-300 bg-white p-4 shadow-sm focus:outline-none">
                            <input type="radio" name="userType" value="admin" class="sr-only" required>
                            <span class="flex flex-1">
                                <span class="flex flex-col">
                                    <span class="block text-sm font-medium text-gray-900">Admin</span>
                                    <span class="mt-1 flex items-center text-xs text-gray-500">Manage system</span>
                                </span>
                            </span>
                            <span class="pointer-events-none absolute -inset-px rounded-lg border-2" aria-hidden="true"></span>
                        </label>
                    </div>
                </div>

                <!-- Personal Information -->
                <div class="space-y-4">
                    <h3 class="text-lg font-medium text-gray-900">Personal Information</h3>
                    
                    <!-- Full Name -->
                    <div>
                        <label for="fullName" class="block text-sm font-medium text-gray-700">
                            Full Name
                        </label>
                        <div class="mt-1">
                            <input id="fullName" name="fullName" type="text" autocomplete="name" required
                                   class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm form-input"
                                   placeholder="Enter your full name">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">
                            Email address
                        </label>
                        <div class="mt-1">
                            <input id="email" name="email" type="email" autocomplete="email" required
                                   class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm form-input"
                                   placeholder="Enter your email">
                        </div>
                    </div>

                    <!-- Department (for Students and Teachers) -->
                    <div id="departmentField" class="hidden">
                        <label for="department" class="block text-sm font-medium text-gray-700">
                            Department
                        </label>
                        <div class="mt-1">
                            <select id="department" name="department" 
                                    class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm form-input">
                                <option value="">Select your department</option>
                                <option value="computer_science">Computer Science</option>
                                <option value="electrical_engineering">Electrical Engineering</option>
                                <option value="mechanical_engineering">Mechanical Engineering</option>
                                <option value="civil_engineering">Civil Engineering</option>
                                <option value="business">Business Administration</option>
                                <option value="arts">Arts & Humanities</option>
                                <option value="science">Natural Sciences</option>
                            </select>
                        </div>
                    </div>

                    <!-- Subject (for Teachers) -->
                    <div id="subjectField" class="hidden">
                        <label for="subject" class="block text-sm font-medium text-gray-700">
                            Teaching Subject
                        </label>
                        <div class="mt-1">
                            <input id="subject" name="subject" type="text" 
                                   class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm form-input"
                                   placeholder="Enter your teaching subject">
                        </div>
                    </div>
                </div>

                <!-- Security Information -->
                <div class="space-y-4">
                    <h3 class="text-lg font-medium text-gray-900">Security Information</h3>
                    
                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">
                            Password
                        </label>
                        <div class="mt-1">
                            <input id="password" name="password" type="password" autocomplete="new-password" required
                                   class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm form-input"
                                   placeholder="Create a strong password">
                        </div>
                        <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters long</p>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700">
                            Confirm Password
                        </label>
                        <div class="mt-1">
                            <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required
                                   class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm form-input"
                                   placeholder="Confirm your password">
                        </div>
                    </div>
                </div>

                <!-- Terms and Conditions -->
                <div class="flex items-center">
                    <input id="terms" name="terms" type="checkbox" required
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="terms" class="ml-2 block text-sm text-gray-900">
                        I agree to the
                        <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Terms and Conditions</a>
                        and
                        <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit" id="registerBtn"
                            class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 btn-hover">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <svg class="h-5 w-5 text-green-500 group-hover:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                            </svg>
                        </span>
                        <span id="registerBtnText">Create Account</span>
                        <div id="registerSpinner" class="hidden spinner ml-2"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/scripts.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script>
        // Registration page specific functionality
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const userTypeInputs = document.querySelectorAll('input[name="userType"]');
            const departmentField = document.getElementById('departmentField');
            const subjectField = document.getElementById('subjectField');
            const registerBtn = document.getElementById('registerBtn');
            const registerBtnText = document.getElementById('registerBtnText');
            const registerSpinner = document.getElementById('registerSpinner');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            // Handle user type selection styling and field visibility
            userTypeInputs.forEach(input => {
                input.addEventListener('change', function() {
                    // Remove active styling from all labels
                    document.querySelectorAll('label').forEach(label => {
                        const borderSpan = label.querySelector('span[aria-hidden="true"]');
                        if (borderSpan) {
                            borderSpan.classList.remove('border-blue-500', 'ring-2', 'ring-blue-500');
                        }
                        label.classList.remove('ring-2', 'ring-blue-500');
                    });
                    
                    // Add active styling to selected label
                    if (this.checked) {
                        const label = this.closest('label');
                        const borderSpan = label.querySelector('span[aria-hidden="true"]');
                        if (borderSpan) {
                            borderSpan.classList.add('border-blue-500', 'ring-2', 'ring-blue-500');
                        }
                        label.classList.add('ring-2', 'ring-blue-500');
                    }

                    // Show/hide fields based on user type
                    const userType = this.value;
                    if (userType === 'student' || userType === 'teacher') {
                        departmentField.classList.remove('hidden');
                        if (userType === 'teacher') {
                            subjectField.classList.remove('hidden');
                        } else {
                            subjectField.classList.add('hidden');
                        }
                    } else {
                        departmentField.classList.add('hidden');
                        subjectField.classList.add('hidden');
                    }
                });
            });

            // Ensure only one option can be selected (radio button behavior)
            userTypeInputs.forEach(input => {
                input.addEventListener('click', function() {
                    // Uncheck all other inputs
                    userTypeInputs.forEach(otherInput => {
                        if (otherInput !== this) {
                            otherInput.checked = false;
                        }
                    });
                });
            });

            // Real-time password validation
            function validatePasswords() {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                if (confirmPassword && password !== confirmPassword) {
                    confirmPasswordInput.classList.add('border-red-500');
                    confirmPasswordInput.classList.remove('border-gray-300');
                    // Show error message
                    let errorMsg = document.getElementById('passwordError');
                    if (!errorMsg) {
                        errorMsg = document.createElement('p');
                        errorMsg.id = 'passwordError';
                        errorMsg.className = 'text-red-500 text-sm mt-1';
                        confirmPasswordInput.parentNode.appendChild(errorMsg);
                    }
                    errorMsg.textContent = 'Passwords do not match';
                    return false;
                } else {
                    confirmPasswordInput.classList.remove('border-red-500');
                    confirmPasswordInput.classList.add('border-gray-300');
                    // Remove error message
                    const errorMsg = document.getElementById('passwordError');
                    if (errorMsg) {
                        errorMsg.remove();
                    }
                    return true;
                }
            }

            // Add event listeners for password validation
            passwordInput.addEventListener('input', validatePasswords);
            confirmPasswordInput.addEventListener('input', validatePasswords);

            // Handle form submission
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Get form data
                const formData = new FormData(registerForm);
                const userType = formData.get('userType');
                const fullName = formData.get('fullName');
                const email = formData.get('email');
                const department = formData.get('department');
                const subject = formData.get('subject');
                const password = formData.get('password');
                const confirmPassword = formData.get('confirmPassword');
                const terms = formData.get('terms');

                // Validate form
                if (!userType || !fullName || !email || !password || !confirmPassword || !terms) {
                    FeedbackSystem.utils.showAlert('Please fill in all required fields.', 'error');
                    return;
                }

                if (!FeedbackSystem.utils.validateEmail(email)) {
                    FeedbackSystem.utils.showAlert('Please enter a valid email address.', 'error');
                    return;
                }

                if (password.length < 6) {
                    FeedbackSystem.utils.showAlert('Password must be at least 6 characters long.', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    FeedbackSystem.utils.showAlert('Passwords do not match.', 'error');
                    return;
                }

                if ((userType === 'student' || userType === 'teacher') && !department) {
                    FeedbackSystem.utils.showAlert('Please select your department.', 'error');
                    return;
                }

                if (userType === 'teacher' && !subject) {
                    FeedbackSystem.utils.showAlert('Please enter your teaching subject.', 'error');
                    return;
                }

                // Show loading state
                registerBtn.disabled = true;
                registerBtnText.textContent = 'Creating Account...';
                registerSpinner.classList.remove('hidden');

                try {
                    // Prepare registration data
                    const registrationData = {
                        action: 'register',
                        name: fullName,
                        email: email,
                        password: password,
                        confirmPassword: confirmPassword,
                        userType: userType,
                        department: department,
                        subject: subject
                    };

                    // Call the registration API
                    const response = await AuthAPI.register(registrationData);
                    
                    if (response.success) {
                        // Show success message
                        FeedbackSystem.utils.showAlert(`Account created successfully! Welcome, ${fullName}!`, 'success');
                        
                        // Redirect based on user type
                        setTimeout(() => {
                            switch(userType) {
                                case 'student':
                                    window.location.href = 'student/dashboard.html';
                                    break;
                                case 'teacher':
                                    window.location.href = 'teacher/dashboard.html';
                                    break;
                                case 'admin':
                                    window.location.href = 'admin/dashboard.html';
                                    break;
                                default:
                                    window.location.href = 'login.html';
                            }
                        }, 1500);
                    } else {
                        FeedbackSystem.utils.showAlert(response.message || 'Registration failed. Please try again.', 'error');
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    FeedbackSystem.utils.showAlert('Registration failed. Please check your connection and try again.', 'error');
                } finally {
                    // Reset button state
                    registerBtn.disabled = false;
                    registerBtnText.textContent = 'Create Account';
                    registerSpinner.classList.add('hidden');
                }
            });

            // Auto-select user type based on email if it contains keywords
            document.getElementById('email').addEventListener('input', function() {
                const email = this.value.toLowerCase();
                userTypeInputs.forEach(input => {
                    input.checked = false;
                });
                
                if (email.includes('student')) {
                    document.querySelector('input[value="student"]').checked = true;
                    document.querySelector('input[value="student"]').dispatchEvent(new Event('change'));
                } else if (email.includes('teacher')) {
                    document.querySelector('input[value="teacher"]').checked = true;
                    document.querySelector('input[value="teacher"]').dispatchEvent(new Event('change'));
                } else if (email.includes('admin')) {
                    document.querySelector('input[value="admin"]').checked = true;
                    document.querySelector('input[value="admin"]').dispatchEvent(new Event('change'));
                }
            });
        });
    </script>
</body>
</html>
